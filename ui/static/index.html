<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skept Provider Eval</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1A1A1A;
      color: #FAF8F5;
      font-family: Calibri, 'Segoe UI', sans-serif;
      font-size: 15px;
      line-height: 1.5;
      padding: 2rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    h1 { color: #DFB87B; font-size: 1.4rem; margin-bottom: 0.2rem; }
    .subtitle { color: #8A8A8A; font-size: 0.85rem; margin-bottom: 2rem; }

    h2 {
      color: #DFB87B;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 2rem 0 0.6rem;
    }

    /* ── Submit ── */
    .submit-row { display: flex; gap: 0.6rem; align-items: center; }

    input[type="url"] {
      flex: 1;
      background: #242424;
      border: 1px solid #333;
      color: #FAF8F5;
      padding: 0.55rem 0.85rem;
      border-radius: 4px;
      font-size: 0.9rem;
      font-family: inherit;
    }
    input[type="url"]:focus { outline: none; border-color: #DFB87B; }
    input[type="url"]::placeholder { color: #555; }

    button {
      background: #DFB87B;
      color: #1A1A1A;
      border: none;
      padding: 0.55rem 1.1rem;
      border-radius: 4px;
      font-weight: 700;
      font-size: 0.9rem;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
    }
    button:hover { background: #e8c98c; }
    button:disabled { background: #444; color: #666; cursor: not-allowed; }

    .btn-outline {
      background: transparent;
      color: #DFB87B;
      border: 1px solid #DFB87B;
      font-weight: 600;
    }
    .btn-outline:hover { background: rgba(223,184,123,0.08); }

    /* ── Spinner ── */
    .spinner { display: none; align-items: center; gap: 0.5rem; color: #8A8A8A; font-size: 0.85rem; margin-top: 0.75rem; }
    .spinner.visible { display: flex; }
    .spin {
      width: 14px; height: 14px;
      border: 2px solid #333;
      border-top-color: #DFB87B;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Tables ── */
    .table-wrap { overflow-x: auto; }

    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }

    th {
      text-align: left;
      color: #6A6A6A;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 0.4rem 0.7rem;
      border-bottom: 1px solid #2A2A2A;
    }

    td {
      padding: 0.45rem 0.7rem;
      border-bottom: 1px solid #222;
      vertical-align: middle;
    }
    tr:hover td { background: #202020; }

    /* ── Score badges ── */
    .badge {
      display: inline-block;
      padding: 0.1rem 0.45rem;
      border-radius: 3px;
      font-weight: 700;
      font-size: 0.78rem;
      white-space: nowrap;
    }
    .badge-green  { background: rgba(80,200,120,0.15); color: #6ddb90; }
    .badge-amber  { background: rgba(223,184,123,0.15); color: #DFB87B; }
    .badge-red    { background: rgba(220,80,80,0.15);   color: #e88; }
    .badge-grey   { background: rgba(100,100,100,0.15); color: #777; }

    .err { color: #e88; font-size: 0.78rem; }
    .muted { color: #555; }

    /* ── URL cell ── */
    .url-cell {
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #6A6A6A;
      font-size: 0.8rem;
    }
    .mono { font-family: 'Courier New', monospace; font-size: 0.75rem; color: #555; }

    /* ── Ground truth dropdown ── */
    select {
      background: #242424;
      color: #FAF8F5;
      border: 1px solid #333;
      padding: 0.2rem 0.4rem;
      border-radius: 3px;
      font-size: 0.8rem;
      font-family: inherit;
      cursor: pointer;
    }
    select:focus { outline: none; border-color: #DFB87B; }

    /* ── Toolbar row ── */
    .toolbar { display: flex; justify-content: space-between; align-items: flex-end; }

    /* ── Empty state ── */
    .empty { color: #444; text-align: center; padding: 1.5rem; font-size: 0.85rem; }

    #current-results { display: none; }
  </style>
</head>
<body>

  <h1>Skept Provider Eval</h1>
  <p class="subtitle">Compare deepfake detection APIs in parallel — paste a social media URL to begin.</p>

  <!-- Submit -->
  <div class="submit-row">
    <input type="url" id="url-input" placeholder="https://www.tiktok.com/..." />
    <button id="analyse-btn" onclick="submitAnalyse()">Analyse</button>
  </div>
  <div class="spinner" id="spinner">
    <div class="spin"></div>
    <span>Downloading clip and running providers in parallel…</span>
  </div>

  <!-- Latest results -->
  <div id="current-results">
    <h2>Latest Results</h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Provider</th>
            <th>Modality</th>
            <th>Score</th>
            <th>Label</th>
            <th>Latency</th>
            <th>Error</th>
          </tr>
        </thead>
        <tbody id="results-body"></tbody>
      </table>
    </div>
  </div>

  <!-- Job history -->
  <div class="toolbar">
    <h2>Job History</h2>
    <button class="btn-outline" style="margin-top:1.4rem" onclick="exportCsv()">Export CSV</button>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Job ID</th>
          <th>URL</th>
          <th>Timestamp</th>
          <th>Ground Truth</th>
          <th>Provider Scores</th>
        </tr>
      </thead>
      <tbody id="history-body">
        <tr><td colspan="5" class="empty">No jobs yet</td></tr>
      </tbody>
    </table>
  </div>

<script>
  function scoreBadge(score) {
    if (score == null) return '<span class="badge badge-grey">—</span>';
    const pct = (score * 100).toFixed(1) + '%';
    const cls = score < 0.35 ? 'badge-green' : score < 0.65 ? 'badge-amber' : 'badge-red';
    return `<span class="badge ${cls}">${pct}</span>`;
  }

  function fmtScore(score) {
    return score == null ? '—' : (score * 100).toFixed(1) + '%';
  }

  function scoreCls(score) {
    if (score == null) return 'badge-grey';
    return score < 0.35 ? 'badge-green' : score < 0.65 ? 'badge-amber' : 'badge-red';
  }

  async function submitAnalyse() {
    const url = document.getElementById('url-input').value.trim();
    if (!url) return;

    const btn = document.getElementById('analyse-btn');
    const spinner = document.getElementById('spinner');
    btn.disabled = true;
    spinner.classList.add('visible');

    try {
      const resp = await fetch('/analyse', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url }),
      });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        alert('Error: ' + (err.detail || resp.statusText));
        return;
      }
      const data = await resp.json();
      renderResults(data.results);
      await loadHistory();
    } catch (e) {
      alert('Request failed: ' + e.message);
    } finally {
      btn.disabled = false;
      spinner.classList.remove('visible');
    }
  }

  function renderResults(results) {
    const tbody = document.getElementById('results-body');
    tbody.innerHTML = results.map(r => `
      <tr>
        <td>${r.provider}</td>
        <td>${r.modality}</td>
        <td>${scoreBadge(r.normalised_score)}</td>
        <td>${r.label || '<span class="muted">—</span>'}</td>
        <td>${r.latency_ms ? r.latency_ms + ' ms' : '<span class="muted">—</span>'}</td>
        <td class="err">${r.error || ''}</td>
      </tr>`).join('');
    document.getElementById('current-results').style.display = 'block';
  }

  async function loadHistory() {
    const resp = await fetch('/jobs');
    const jobs = await resp.json();
    const tbody = document.getElementById('history-body');

    if (!jobs.length) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty">No jobs yet</td></tr>';
      return;
    }

    tbody.innerHTML = jobs.map(job => {
      const scores = (job.results || []).map(r =>
        `<span class="badge ${scoreCls(r.normalised_score)}" title="${r.provider}/${r.modality}">`
        + `${r.provider.slice(0,3)} ${fmtScore(r.normalised_score)}</span>`
      ).join(' ');

      const gt = job.ground_truth || 'unknown';
      return `<tr>
        <td class="mono">${job.job_id.slice(0, 8)}</td>
        <td class="url-cell" title="${escHtml(job.clip_url)}">${escHtml(job.clip_url)}</td>
        <td style="white-space:nowrap;font-size:0.8rem;color:#6A6A6A">${fmtDate(job.created_at)}</td>
        <td>
          <select onchange="setGroundTruth('${job.job_id}', this.value)">
            <option value="unknown" ${gt==='unknown'?'selected':''}>unknown</option>
            <option value="fake"    ${gt==='fake'   ?'selected':''}>fake</option>
            <option value="authentic" ${gt==='authentic'?'selected':''}>authentic</option>
          </select>
        </td>
        <td>${scores || '<span class="muted">—</span>'}</td>
      </tr>`;
    }).join('');
  }

  async function setGroundTruth(jobId, label) {
    await fetch(`/jobs/${jobId}/ground_truth`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ label }),
    });
  }

  function exportCsv() {
    window.location.href = '/export';
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function fmtDate(iso) {
    try { return new Date(iso + 'Z').toLocaleString(); } catch { return iso; }
  }

  document.getElementById('url-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitAnalyse();
  });

  loadHistory();
</script>
</body>
</html>
